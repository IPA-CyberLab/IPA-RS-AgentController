name: release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: ipa-rs-isolated-agent-x86_64-unknown-linux-gnu.tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: ipa-rs-isolated-agent-aarch64-unknown-linux-gnu.tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: ipa-rs-isolated-agent-x86_64-apple-darwin.tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: ipa-rs-isolated-agent-aarch64-apple-darwin.tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: ipa-rs-isolated-agent-x86_64-pc-windows-msvc.tar.gz
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: ipa-rs-isolated-agent-aarch64-pc-windows-msvc.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --workspace --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="dist/ipa-rs-isolated-agent-${{ matrix.target }}"
          mkdir -p "$staging/bin" "$staging/packaging"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/agentctl.exe" "$staging/bin/"
            cp "target/${{ matrix.target }}/release/agent-forkd.exe" "$staging/bin/"
          else
            cp "target/${{ matrix.target }}/release/agentctl" "$staging/bin/"
            cp "target/${{ matrix.target }}/release/agent-forkd" "$staging/bin/"
          fi
          cp -R packaging/agent-forkd "$staging/packaging/"
          cp -R packaging/systemd "$staging/packaging/"
          cp README.md LICENSE install.sh install.ps1 "$staging/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "ipa-rs-isolated-agent-${{ matrix.target }}"

      - name: Smoke test native desktop daemon
        if: runner.os != 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bin_dir="$PWD/target/${{ matrix.target }}/release"
          agentctl="$bin_dir/agentctl"
          daemon="$bin_dir/agent-forkd"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            agentctl="$agentctl.exe"
            daemon="$daemon.exe"
          fi

          runner_temp="${RUNNER_TEMP//\\//}"
          agentfs="$runner_temp/agentfs-${{ matrix.target }}"
          source_dir="$runner_temp/source-${{ matrix.target }}"
          daemon_log="$runner_temp/agent-forkd-${{ matrix.target }}.log"
          rm -rf "$agentfs" "$source_dir"
          mkdir -p "$source_dir/nested"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            printf 'desktop source\n' > "$source_dir/nested/source.txt"
          fi

          "$daemon" --agentfs "$agentfs" > "$daemon_log" 2>&1 &
          daemon_pid=$!
          cleanup() {
            kill "$daemon_pid" >/dev/null 2>&1 || true
            wait "$daemon_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in {1..40}; do
            if "$agentctl" --agentfs "$agentfs" init >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          "$agentctl" --agentfs "$agentfs" env list

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            "$agentctl" --agentfs "$agentfs" new -t smoke --from "$source_dir" -- powershell.exe -NoProfile -Command "Set-Content -Path created.txt -Value desktop-smoke; Get-Content created.txt" | tee "$runner_temp/exec.out"
          else
            "$agentctl" --agentfs "$agentfs" new -t smoke --from "$source_dir" -- /bin/sh -c "cat nested/source.txt && echo desktop-smoke > created.txt && cat created.txt" | tee "$runner_temp/exec.out"
          fi
          grep -q "desktop-smoke" "$runner_temp/exec.out"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            printf 'cd\r\nexit\r\n' | "$agentctl" --agentfs "$agentfs" shell smoke | tee "$runner_temp/shell.out"
          else
            printf 'pwd\nexit\n' | "$agentctl" --agentfs "$agentfs" shell smoke | tee "$runner_temp/shell.out"
          fi
          grep -q "rootfs" "$runner_temp/shell.out"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            "$agentctl" --agentfs "$agentfs" session create smoke dev -- powershell.exe -NoProfile -Command "Write-Output desktop-session; Start-Sleep -Seconds 30"
          else
            "$agentctl" --agentfs "$agentfs" session create smoke dev -- /bin/sh -c "echo desktop-session; sleep 30"
          fi
          "$agentctl" --agentfs "$agentfs" session list smoke | tee "$runner_temp/sessions.out"
          grep -q "dev" "$runner_temp/sessions.out"

          for _ in {1..40}; do
            "$agentctl" --agentfs "$agentfs" session logs smoke dev > "$runner_temp/session.log" || true
            if grep -q "desktop-session" "$runner_temp/session.log"; then
              break
            fi
            sleep 0.5
          done
          grep -q "desktop-session" "$runner_temp/session.log"
          "$agentctl" --agentfs "$agentfs" session kill smoke dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "Automated binary release for $TAG."
