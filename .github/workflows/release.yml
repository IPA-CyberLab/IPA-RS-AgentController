name: release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: ipa-rs-isolated-agent-x86_64-unknown-linux-gnu.tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: ipa-rs-isolated-agent-aarch64-unknown-linux-gnu.tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: ipa-rs-isolated-agent-x86_64-apple-darwin.tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: ipa-rs-isolated-agent-aarch64-apple-darwin.tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: ipa-rs-isolated-agent-x86_64-pc-windows-msvc.tar.gz
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: ipa-rs-isolated-agent-aarch64-pc-windows-msvc.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --workspace --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="dist/ipa-rs-isolated-agent-${{ matrix.target }}"
          mkdir -p "$staging/bin" "$staging/packaging"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/agentctl.exe" "$staging/bin/"
            cp "target/${{ matrix.target }}/release/agent-forkd.exe" "$staging/bin/"
          else
            cp "target/${{ matrix.target }}/release/agentctl" "$staging/bin/"
            cp "target/${{ matrix.target }}/release/agent-forkd" "$staging/bin/"
          fi
          cp -R packaging/agent-forkd "$staging/packaging/"
          cp -R packaging/systemd "$staging/packaging/"
          cp README.md LICENSE install.sh install.ps1 "$staging/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "ipa-rs-isolated-agent-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "Automated binary release for $TAG."
